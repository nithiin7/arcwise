[tool.ruff]
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "B", "SIM"]

[tool.ruff.format]
quote-style = "double"

[tool.mypy]
python_version = "3.12"
strict = true

[tool.commitizen]
name = "cz_conventional_commits"
version = "0.1.0"
tag_format = "backend-v$version"
changelog_file = "CHANGELOG.md"
update_changelog_on_bump = true
