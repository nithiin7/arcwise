<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="120" height="120" rx="28" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="20" y1="0" x2="20" y2="120" stroke="white" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="40" y1="0" x2="40" y2="120" stroke="white" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="60" y1="0" x2="60" y2="120" stroke="white" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="80" y1="0" x2="80" y2="120" stroke="white" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="100" y1="0" x2="100" y2="120" stroke="white" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="0" y1="20" x2="120" y2="20" stroke="white" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="0" y1="40" x2="120" y2="40" stroke="white" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="0" y1="60" x2="120" y2="60" stroke="white" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="0" y1="80" x2="120" y2="80" stroke="white" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="0" y1="100" x2="120" y2="100" stroke="white" stroke-opacity="0.06" stroke-width="1"/>

  <!-- Connection lines (architecture graph edges) -->
  <line x1="60" y1="28" x2="28" y2="60" stroke="white" stroke-opacity="0.35" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="60" y1="28" x2="92" y2="60" stroke="white" stroke-opacity="0.35" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="28" y1="60" x2="48" y2="92" stroke="white" stroke-opacity="0.35" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="92" y1="60" x2="72" y2="92" stroke="white" stroke-opacity="0.35" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="48" y1="92" x2="72" y2="92" stroke="white" stroke-opacity="0.35" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="28" y1="60" x2="92" y2="60" stroke="white" stroke-opacity="0.2" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- Nodes -->
  <!-- Top center (entry) -->
  <circle cx="60" cy="28" r="7" fill="white" fill-opacity="0.95"/>
  <circle cx="60" cy="28" r="4" fill="url(#bg)"/>

  <!-- Middle left -->
  <circle cx="28" cy="60" r="7" fill="white" fill-opacity="0.95"/>
  <circle cx="28" cy="60" r="4" fill="url(#bg)"/>

  <!-- Middle right -->
  <circle cx="92" cy="60" r="7" fill="white" fill-opacity="0.95"/>
  <circle cx="92" cy="60" r="4" fill="url(#bg)"/>

  <!-- Bottom left -->
  <circle cx="48" cy="92" r="6" fill="white" fill-opacity="0.8"/>
  <circle cx="48" cy="92" r="3.5" fill="url(#bg)"/>

  <!-- Bottom right -->
  <circle cx="72" cy="92" r="6" fill="white" fill-opacity="0.8"/>
  <circle cx="72" cy="92" r="3.5" fill="url(#bg)"/>

  <!-- Glowing arc on top node to indicate "Arcwise" -->
  <path d="M 48 20 A 15 15 0 0 1 72 20" stroke="url(#glow)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
</svg>
